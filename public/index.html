<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangChain Pro - 智能问答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.ai {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #667eea;
        }

        .message.ai .avatar {
            background: #764ba2;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: #f1f3f4;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.ai .message-content img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 8px;
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            background: #fafafa;
        }

        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-btn,
        .clear-btn,
        .image-btn {
            padding: 14px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: #e0e0e0;
            color: #666;
        }

        .clear-btn:hover {
            background: #d0d0d0;
        }

        .image-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .image-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .image-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #764ba2;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .loading span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        .welcome-message {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }

        .welcome-message h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .mode-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .mode-btn.active {
            background: white;
            color: #667eea;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .mode-btn.active:hover {
            background: white;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 LangChain Pro 智能问答</h1>
            <div class="mode-toggle">
                <button class="mode-btn active" id="chatModeBtn" onclick="setMode('chat')">💬 聊天</button>
                <button class="mode-btn" id="imageModeBtn" onclick="setMode('image')">🎨 图片生成</button>
            </div>
            <p id="modeDescription">基于通义千问大模型</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>👋 你好！</h2>
                <p>我是通义千问AI助手，有什么可以帮助你的吗？</p>
            </div>
        </div>

        <div class="chat-input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="输入你的问题..." autocomplete="off">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            <button class="image-btn" id="imageBtn" onclick="generateImage()" style="display: none;">🎨 生成</button>
            <button class="clear-btn" onclick="clearChat()">清空</button>
        </div>
    </div>

    <script>
        const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const imageBtn = document.getElementById('imageBtn');
        let currentMode = 'chat';

        function setMode(mode) {
            currentMode = mode;
            const chatModeBtn = document.getElementById('chatModeBtn');
            const imageModeBtn = document.getElementById('imageModeBtn');
            const modeDescription = document.getElementById('modeDescription');

            if (mode === 'chat') {
                chatModeBtn.classList.add('active');
                imageModeBtn.classList.remove('active');
                sendBtn.style.display = 'block';
                imageBtn.style.display = 'none';
                chatInput.placeholder = '输入你的问题...';
                modeDescription.textContent = '基于通义千问大模型';
            } else {
                imageModeBtn.classList.add('active');
                chatModeBtn.classList.remove('active');
                sendBtn.style.display = 'none';
                imageBtn.style.display = 'block';
                chatInput.placeholder = '描述你想生成的图片...';
                modeDescription.textContent = '基于通义万相图片生成模型';
            }
        }

        // 回车发送消息
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (currentMode === 'chat') {
                    sendMessage();
                } else {
                    generateImage();
                }
            }
        });

        function addMessage(content, isUser) {
            const welcome = chatMessages.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;

            messageDiv.innerHTML = `
                <div class="avatar">${isUser ? '👤' : '🤖'}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addImageMessage(imageUrl) {
            const welcome = chatMessages.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';

            messageDiv.innerHTML = `
                <div class="avatar">🎨</div>
                <div class="message-content">
                    <div>图片生成完成：</div>
                    <img src="${imageUrl}" alt="生成的图片" onerror="this.parentElement.innerHTML='图片加载失败'">
                </div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addLoading() {
            const welcome = chatMessages.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.id = 'loading';
            loadingDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="loading">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addImageLoading() {
            const welcome = chatMessages.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.id = 'loading';
            loadingDiv.innerHTML = `
                <div class="avatar">🎨</div>
                <div class="loading">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            chatInput.value = '';
            sendBtn.disabled = true;

            addLoading();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId })
                });

                const data = await response.json();
                removeLoading();

                if (data.reply) {
                    addMessage(data.reply, false);
                } else {
                    addMessage('抱歉，出现了一些问题。', false);
                }
            } catch (error) {
                removeLoading();
                addMessage('网络错误，请稍后重试。', false);
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        async function generateImage() {
            const prompt = chatInput.value.trim();
            if (!prompt) return;

            addMessage(prompt, true);
            chatInput.value = '';
            imageBtn.disabled = true;

            addImageLoading();

            try {
                const response = await fetch('/api/generate-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();
                removeLoading();

                if (data.imageUrl) {
                    addImageMessage(data.imageUrl);
                } else {
                    addMessage('图片生成失败: ' + (data.error || '未知错误'), false);
                }
            } catch (error) {
                removeLoading();
                addMessage('网络错误，请稍后重试。', false);
            } finally {
                imageBtn.disabled = false;
                chatInput.focus();
            }
        }

        async function clearChat() {
            try {
                await fetch('/api/clear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });

                chatMessages.innerHTML = `
                    <div class="welcome-message">
                        <h2>👋 你好！</h2>
                        <p>我是通义千问AI助手，有什么可以帮助你的吗？</p>
                    </div>
                `;
            } catch (error) {
                console.error('清空聊天失败:', error);
            }
        }

        chatInput.focus();
    </script>
</body>

</html>
